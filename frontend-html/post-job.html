<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Job - Job Matching Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f9fafb; }
    nav { background: #4f46e5; padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; }
    nav h1 { color: white; font-size: 20px; }
    nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 15px; }
    .container { max-width: 600px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; border: 1px solid #e5e7eb; }
    h2 { color: #4f46e5; margin-bottom: 24px; text-align: center; }
    label { display: block; margin-bottom: 6px; color: #374151; font-size: 14px; }
    input, textarea { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 15px; }
    textarea { height: 120px; }
    .skills-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .skill-btn { padding: 6px 14px; border-radius: 20px; border: none; cursor: pointer; background: #e5e7eb; color: black; font-size: 14px; }
    .skill-btn.selected { background: #4f46e5; color: white; }
    button[type=submit] { width: 100%; background: #4f46e5; color: white; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button[type=submit]:hover { background: #4338ca; }
    .message { text-align: center; margin-top: 16px; padding: 10px; border-radius: 8px; display: none; }
    .success { background: #d1fae5; color: #065f46; }
    .error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <nav>
    <h1>Job Matching Platform</h1>
    <div>
      <a href="index.html">Home</a>
      <a href="jobs.html">Jobs</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </div>
  </nav>

  <div class="container">
    <h2>Post a New Job</h2>

    <label>Job Title</label>
    <input type="text" id="title" placeholder="e.g. Frontend Developer" />

    <label>Description</label>
    <textarea id="description" placeholder="Describe the job role..."></textarea>

    <label>Required Skills</label>
    <div class="skills-container">
      <button class="skill-btn" onclick="toggleSkill(this, 'React')">React</button>
      <button class="skill-btn" onclick="toggleSkill(this, 'JavaScript')">JavaScript</button>
      <button class="skill-btn" onclick="toggleSkill(this, 'Node.js')">Node.js</button>
      <button class="skill-btn" onclick="toggleSkill(this, 'NestJS')">NestJS</button>
      <button class="skill-btn" onclick="toggleSkill(this, 'Python')">Python</button>
      <button class="skill-btn" onclick="toggleSkill(this, 'CSS')">CSS</button>
      <button class="skill-btn" onclick="toggleSkill(this, 'SQL')">SQL</button>
      <button class="skill-btn" onclick="toggleSkill(this, 'TypeScript')">TypeScript</button>
    </div>

    <label>Application Deadline</label>
    <input type="date" id="deadline" />

    <label>Company Name</label>
    <input type="text" id="companyName" placeholder="e.g. Damina Tech" />

    <button type="submit" onclick="postJob()">Post Job</button>

    <div class="message" id="message"></div>
  </div>

  <script>
    let selectedSkills = [];

    function toggleSkill(btn, skill) {
      if (selectedSkills.includes(skill)) {
        selectedSkills = selectedSkills.filter(s => s !== skill);
        btn.classList.remove('selected');
      } else {
        selectedSkills.push(skill);
        btn.classList.add('selected');
      }
    }

    async function postJob() {
      const token = localStorage.getItem('token');
      if (!token) {
        alert('Please login first!');
        window.location.href = 'login.html';
        return;
      }

      const title = document.getElementById('title').value;
      const description = document.getElementById('description').value;
      const deadline = document.getElementById('deadline').value;
      const companyName = document.getElementById('companyName').value;

      const response = await fetch('http://localhost:3001/jobs', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({
          title,
          description,
          requiredSkills: selectedSkills.join(','),
          deadline,
          companyName,
          employerId: JSON.parse(localStorage.getItem('user')).id
        })
      });

      const data = await response.json();
      const message = document.getElementById('message');
      message.style.display = 'block';

      if (response.ok) {
        message.className = 'message success';
        message.textContent = 'Job posted successfully!';
        setTimeout(() => window.location.href = 'jobs.html', 1500);
      } else {
        message.className = 'message error';
        message.textContent = data.message || 'Something went wrong!';
      }
    }
  </script>
</body>
</html>
